<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | GlicoSalva</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Glico<strong>Salva</strong> 🌿</div>
            <ul class="nav-links">
                <li><a href="../index.html">Início</a></li>
                <li><a href="sobre.html">Rede SUS & ODS</a></li>
                <li><a href="contato.html" class="active">Peça Acolhimento</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="calculator-section" style="max-width: 600px; margin: 0 auto;">
            <h2>Peça Acolhimento Voluntário</h2>
            <p>Inscreva-se abaixo para receber mensagens de apoio de veteranos em Salvador.</p>
            
            <form id="form-ajuda" class="custom-form">
                <div class="input-group full-width">
                    <label>Seu Nome:</label>
                    <input type="text" id="nome-user" required placeholder="Nome completo">
                </div>
                <div class="input-group full-width">
                    <label>Bairro de Salvador:</label>
                    <input type="text" id="bairro-user" required placeholder="Ex: Brotas, Cabula, Pituba...">
                </div>
                <div class="input-group full-width">
                    <label>Sua maior dúvida atual:</label>
                    <textarea id="duvida-user" rows="4" required placeholder="O que mais te preocupa no momento?"></textarea>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 1rem;">Solicitar Contato</button>
            </form>
            <div id="sucesso-box" class="result-box hidden" style="background: #e6fffa; border-color: var(--verde-principal);"></div>
        </section>
    </main>

    <footer>
        <p>Projeto Acadêmico • ODS 3 (Saúde e Bem-Estar) • Feito para Salvador/BA</p>
    </footer>

    <script src="../scripts/main.js"></script>
</body>
</html>
